name: Docker Build, Push and Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{github.repository}}

jobs:
  update-version:
    name: Update Version in .csproj
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Из тега $TAG_NAME извлечена версия: $VERSION"

      - name: Update version in .csproj
        run: |
          CSPROJ_FILE="MyFirstCI.Api/MyFirstCI.Api.csproj"
          VERSION="${{ steps.get_version.outputs.version }}"
          
          if grep -q "<Version>" "$CSPROJ_FILE"; then
            sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" "$CSPROJ_FILE"
            echo "Обновлен существующий тег Version на $VERSION"
          else
            sed -i "/<PropertyGroup>/a \ \ <Version>$VERSION</Version>" "$CSPROJ_FILE"
            echo "Добавлен новый тег Version: $VERSION"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MyFirstCI.Api/MyFirstCI.Api.csproj
          git commit -m "Update version to ${{ steps.get_version.outputs.version }}" || echo "Нет изменений для коммита"
          
          # Переключаемся на ветку main и пушим
          git checkout main || git checkout -b main
          git pull origin main --rebase || true
          git push origin main
  test:
    name: Run Tests
    needs: update-version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run tests
        run: |
          dotnet restore
          dotnet test --verbosity normal

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GHCR_TOKEN}}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}
          tags: |
            type=semver, pattern={{version}}
            type=semver, pattern={{major}}.{{minor}}
            type=ref, event=tag
          labels: |
            org.opencontainers.image.title=${{github.event.repository.name}}
            org.opencontainers.image.version=${{steps.meta.outputs.version}}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}
          labels: |
            ${{steps.meta.outputs.labels}}
            org.opencontainers.image.source=${{github.server_url}}/${{github.repository}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build application for release
        run: |
          dotnet restore
          dotnet publish MyFirstCI.Api/MyFirstCI.Api.csproj \
            -c Release \
            -o ./publish-release \
            --self-contained false \
            -p:PublishSingleFile=false

      - name: Create release archive
        run: |
          tar -czf my-app-release.tar.gz -C ./publish-release .
          zip -r my-app-release.zip ./publish-release/*

      - name: Generate release notes from tag
        id: release_notes
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          RELEASE_NOTES=$(git tag -l --format='%(contents)' "$TAG_NAME")
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $TAG_NAME"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine if prerelease
        id: check_prerelease
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          if [[ "$TAG_NAME" == *"beta"* ]] || [[ "$TAG_NAME" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
          files: |
            my-app-release.tar.gz
            my-app-release.zip
          tag_name: ${{ github.ref_name }}